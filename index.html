<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Battle</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  user-select: none;
}

h1 {
  font-size: 1.6rem;
  margin-bottom: 12px;
  letter-spacing: 2px;
  color: #e94560;
}

#game {
  width: 420px;
  max-width: 95vw;
}

/* --- Areas --- */
.area {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 8px 0;
}

.area-label {
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 4px;
}

.cards {
  display: flex;
  gap: 8px;
  justify-content: center;
  min-height: 100px;
}

/* --- Card --- */
.card {
  width: 64px;
  height: 92px;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  transition: transform 0.2s ease, box-shadow 0.15s;
  position: relative;
}

.card-front {
  background: linear-gradient(135deg, #16213e, #0f3460);
  border: 2px solid #e94560;
  cursor: pointer;
}

.card-front:hover {
  transform: translateY(-6px);
  box-shadow: 0 6px 18px rgba(233, 69, 96, 0.4);
}

.card-front.non-interactive {
  cursor: default;
}

.card-front.non-interactive:hover {
  transform: none;
  box-shadow: none;
}

/* --- Draggable cards --- */
.card-front.draggable {
  cursor: grab;
}

.card-front.draggable:active {
  cursor: grabbing;
}

.card-front.dragging {
  opacity: 0.3;
}

.card-front.auto-active {
  border-color: #50dc64;
  box-shadow: 0 0 12px rgba(80, 220, 100, 0.5);
  transform: translateY(-6px);
}

.card-front.non-interactive.auto-active {
  transform: translateY(-6px);
}

.card-back {
  background: linear-gradient(135deg, #333, #555);
  border: 2px solid #666;
}

.card .card-icon {
  font-size: 1.4rem;
  line-height: 1;
}

.card .card-name {
  font-size: 0.55rem;
  color: #e94560;
  margin-top: 2px;
}

.card .atk-range {
  font-size: 0.65rem;
  color: #ccc;
  margin-top: 4px;
}

/* --- Battle area --- */
#battle-area {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  margin: 16px 0;
  min-height: 120px;
}

.battle-slot {
  width: 72px;
  height: 100px;
  border: 2px dashed #444;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: #666;
}

.battle-slot.active {
  border-color: #e94560;
}

.battle-slot .rolled-value {
  font-size: 1.8rem;
  font-weight: bold;
  color: #fff;
}

.battle-slot .slot-card {
  font-size: 0.6rem;
  color: #ccc;
  max-width: 100%;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.battle-slot .slot-owner {
  font-size: 0.65rem;
  color: #aaa;
  margin-top: 2px;
}

#vs {
  font-size: 1.2rem;
  font-weight: bold;
  color: #e94560;
}

/* --- Message --- */
#message {
  text-align: center;
  font-size: 1rem;
  min-height: 28px;
  margin: 8px 0;
  color: #f0c040;
}

/* --- Buttons --- */
#restart-btn {
  display: none;
  margin: 12px auto;
  padding: 10px 28px;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  background: #e94560;
  color: #fff;
  cursor: pointer;
  font-weight: bold;
}

#restart-btn:hover {
  background: #c73652;
}

#start-btn {
  display: none;
  margin: 12px auto;
  padding: 10px 28px;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  background: #50dc64;
  color: #1a1a2e;
  cursor: pointer;
  font-weight: bold;
}

#start-btn:hover {
  background: #3cb850;
}

.arrange-hint {
  font-size: 0.75rem;
  color: #888;
  text-align: center;
  margin-top: 4px;
}

/* --- Animations --- */
@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
.pop {
  animation: pop 0.35s ease-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.shake {
  animation: shake 0.4s ease-out;
}

.win-glow {
  box-shadow: 0 0 16px rgba(80, 220, 100, 0.7);
  border-color: #50dc64 !important;
}

.lose-glow {
  box-shadow: 0 0 16px rgba(233, 69, 96, 0.7);
  border-color: #e94560 !important;
}
</style>
</head>
<body>

<h1>CARD BATTLE</h1>

<div id="game">
  <!-- CPU hand -->
  <div class="area">
    <div class="area-label">CPU (<span id="cpu-count">5</span>枚)</div>
    <div class="cards" id="cpu-hand"></div>
  </div>

  <!-- Battle -->
  <div id="battle-area">
    <div class="battle-slot" id="cpu-slot">CPU</div>
    <div id="vs">VS</div>
    <div class="battle-slot" id="player-slot">YOU</div>
  </div>

  <div id="message" aria-live="polite" aria-atomic="true">カードを1枚選んでください</div>

  <!-- Player hand -->
  <div class="area">
    <div class="area-label">あなた (<span id="player-count">5</span>枚)</div>
    <div class="cards" id="player-hand"></div>
  </div>

  <button id="start-btn" onclick="startBattle()">バトル開始</button>
  <button id="restart-btn" onclick="initGame()">もう一度遊ぶ</button>
</div>

<script>
// --- Card types ---
const CARD_TYPES = [
  { name: 'ポーン',     icon: '♟', minAtk: 3, maxAtk: 6 },
  { name: 'ナイト',     icon: '♞', minAtk: 4, maxAtk: 6 },
  { name: 'ルーク',     icon: '♜', minAtk: 3, maxAtk: 8 },
  { name: 'ビショップ', icon: '♝', minAtk: 5, maxAtk: 7 },
  { name: 'クイーン',   icon: '♛', minAtk: 5, maxAtk: 8 },
  { name: 'キング',     icon: '♚', minAtk: 2, maxAtk: 10 },
];

// --- State ---
let playerHand = [];
let cpuHand = [];
let phase = 'arrange'; // 'arrange' | 'battle'
let dragSrcIndex = null;
let dragOverIndex = null;
let focusedIndex = -1;

// --- Helpers ---
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function rollAtk(card) {
  return randInt(card.minAtk, card.maxAtk);
}

function makeCard() {
  const type = CARD_TYPES[randInt(0, CARD_TYPES.length - 1)];
  return { ...type };
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// --- Rendering ---
function renderHands(activePlayerIdx, activeCpuIdx) {
  const ph = document.getElementById('player-hand');
  const ch = document.getElementById('cpu-hand');

  ph.innerHTML = '';
  ch.innerHTML = '';

  playerHand.forEach((card, i) => {
    const el = document.createElement('div');
    const isActive = activePlayerIdx === i;
    if (phase === 'arrange') {
      el.className = 'card card-front draggable pop';
      el.setAttribute('draggable', 'true');
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-roledescription', '並び替え可能なカード');
      el.addEventListener('dragstart', (e) => onDragStart(e, i));
      el.addEventListener('dragover', (e) => onDragOver(e));
      el.addEventListener('dragenter', (e) => onDragEnter(e, i));
      el.addEventListener('drop', (e) => onDrop(e));
      el.addEventListener('dragend', () => onDragEnd());
      el.addEventListener('keydown', (e) => onCardKeydown(e, i));
    } else {
      el.className = 'card card-front non-interactive' + (isActive ? ' auto-active' : '');
    }
    el.setAttribute('aria-label', `カード ${i + 1} / ${playerHand.length} (${card.name}): 攻撃力 ${card.minAtk} から ${card.maxAtk}`);
    el.innerHTML = `
      <span class="card-icon">${card.icon}</span>
      <span class="card-name">${card.name}</span>
      <span class="atk-range">${card.minAtk}-${card.maxAtk}</span>
    `;
    ph.appendChild(el);
  });

  cpuHand.forEach((card, i) => {
    const el = document.createElement('div');
    const isActive = activeCpuIdx === i;
    el.className = 'card card-front cpu-card non-interactive' + (isActive ? ' auto-active' : '');
    el.setAttribute('aria-label', `CPUカード ${i + 1} (${card.name}): 攻撃力 ${card.minAtk} から ${card.maxAtk}`);
    el.innerHTML = `
      <span class="card-icon">${card.icon}</span>
      <span class="card-name">${card.name}</span>
      <span class="atk-range">${card.minAtk}-${card.maxAtk}</span>
    `;
    ch.appendChild(el);
  });

  document.getElementById('player-count').textContent = playerHand.length;
  document.getElementById('cpu-count').textContent = cpuHand.length;

  // Restore focus after re-render
  if (phase === 'arrange' && focusedIndex >= 0 && focusedIndex < playerHand.length) {
    ph.children[focusedIndex].focus();
  }
}

function setMessage(text) {
  document.getElementById('message').textContent = text;
}

function renderBattleSlot(slot, card, atk, label) {
  slot.className = 'battle-slot active';
  slot.innerHTML = `<span class="slot-card">${card.icon} ${card.name}</span><span class="rolled-value">${atk}</span><span class="slot-owner">${label}</span>`;
}

function clearBattle() {
  document.getElementById('player-slot').innerHTML = 'YOU';
  document.getElementById('player-slot').className = 'battle-slot';
  document.getElementById('cpu-slot').innerHTML = 'CPU';
  document.getElementById('cpu-slot').className = 'battle-slot';
}

// --- Keyboard reorder ---
function onCardKeydown(e, index) {
  if (phase !== 'arrange') return;
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (index > 0) {
      [playerHand[index], playerHand[index - 1]] = [playerHand[index - 1], playerHand[index]];
      focusedIndex = index - 1;
      renderHands();
      setMessage(`カード ${focusedIndex + 1} に移動しました（←→で並び替え）`);
    }
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (index < playerHand.length - 1) {
      [playerHand[index], playerHand[index + 1]] = [playerHand[index + 1], playerHand[index]];
      focusedIndex = index + 1;
      renderHands();
      setMessage(`カード ${focusedIndex + 1} に移動しました（←→で並び替え）`);
    }
  }
}

// --- Drag and drop ---
function onDragStart(e, index) {
  if (phase !== 'arrange') return;
  dragSrcIndex = index;
  dragOverIndex = index;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(index));
  setTimeout(() => {
    const cards = document.getElementById('player-hand').children;
    if (cards[index]) cards[index].classList.add('dragging');
  }, 0);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onDragEnter(e, targetIndex) {
  e.preventDefault();
  if (dragSrcIndex === null || targetIndex === dragOverIndex) return;
  dragOverIndex = targetIndex;
  updateDragVisuals();
}

function updateDragVisuals() {
  const cards = [...document.getElementById('player-hand').children];
  let cardWidth = 72;
  if (cards.length >= 2) {
    cardWidth = cards[1].getBoundingClientRect().left - cards[0].getBoundingClientRect().left;
  }

  cards.forEach((card, i) => {
    let shift = 0;

    if (i === dragSrcIndex) {
      // Dragged card slides to target position
      shift = (dragOverIndex - dragSrcIndex) * cardWidth;
    } else if (dragSrcIndex < dragOverIndex) {
      // Dragging right: cards in between shift left
      if (i > dragSrcIndex && i <= dragOverIndex) {
        shift = -cardWidth;
      }
    } else if (dragSrcIndex > dragOverIndex) {
      // Dragging left: cards in between shift right
      if (i >= dragOverIndex && i < dragSrcIndex) {
        shift = cardWidth;
      }
    }

    card.style.transform = shift ? `translateX(${shift}px)` : '';
  });
}

function onDrop(e) {
  e.preventDefault();
  if (dragSrcIndex !== null && dragOverIndex !== null && dragSrcIndex !== dragOverIndex) {
    const moved = playerHand.splice(dragSrcIndex, 1)[0];
    playerHand.splice(dragOverIndex, 0, moved);
  }
  dragSrcIndex = null;
  dragOverIndex = null;
  renderHands();
}

function onDragEnd() {
  // Clean up if drop didn't handle it (e.g. drag canceled)
  dragSrcIndex = null;
  dragOverIndex = null;
  renderHands();
}

// --- Auto battle ---
function startBattle() {
  if (phase !== 'arrange') return;
  phase = 'battle';
  document.getElementById('start-btn').style.display = 'none';
  shuffleArray(cpuHand);
  renderHands();
  setMessage('バトル開始！');
  setTimeout(() => playNextRound(), 800);
}

function playNextRound() {
  // Both sides play from left (index 0)
  const playerCard = playerHand[0];
  const cpuCard = cpuHand[0];

  // Highlight active cards
  renderHands(0, 0);

  setTimeout(() => {
    const playerAtk = rollAtk(playerCard);
    const cpuAtk = rollAtk(cpuCard);

    const pSlot = document.getElementById('player-slot');
    const cSlot = document.getElementById('cpu-slot');

    renderBattleSlot(pSlot, playerCard, playerAtk, 'あなた');
    renderBattleSlot(cSlot, cpuCard, cpuAtk, 'CPU');

    let resultMsg = '';
    if (playerAtk > cpuAtk) {
      resultMsg = `${playerAtk} vs ${cpuAtk} — あなたの勝ち！ CPUのカードを破壊！`;
      cpuHand.splice(0, 1);
      pSlot.classList.add('win-glow');
      cSlot.classList.add('lose-glow');
      cSlot.classList.add('shake');
    } else if (cpuAtk > playerAtk) {
      resultMsg = `${playerAtk} vs ${cpuAtk} — CPUの勝ち… あなたのカードを失った！`;
      playerHand.splice(0, 1);
      cSlot.classList.add('win-glow');
      pSlot.classList.add('lose-glow');
      pSlot.classList.add('shake');
    } else {
      resultMsg = `${playerAtk} vs ${cpuAtk} — 引き分け！ 両方のカードを破壊！`;
      playerHand.splice(0, 1);
      cpuHand.splice(0, 1);
    }

    setMessage(resultMsg);
    renderHands();

    setTimeout(() => {
      if (playerHand.length === 0 && cpuHand.length === 0) {
        setMessage('引き分け！ 両方のカードがなくなりました');
        document.getElementById('restart-btn').style.display = 'block';
        return;
      }
      if (playerHand.length === 0) {
        setMessage('ゲームオーバー… あなたのカードがなくなりました');
        document.getElementById('restart-btn').style.display = 'block';
        return;
      }
      if (cpuHand.length === 0) {
        setMessage('あなたの勝利！ CPUのカードをすべて破壊しました！');
        document.getElementById('restart-btn').style.display = 'block';
        return;
      }

      setTimeout(() => {
        clearBattle();
        setMessage('次のカード…');
        setTimeout(() => playNextRound(), 600);
      }, 800);
    }, 1200);
  }, 600);
}

// --- Init ---
function initGame() {
  playerHand = Array.from({ length: 5 }, makeCard);
  cpuHand = Array.from({ length: 5 }, makeCard);
  phase = 'arrange';
  dragSrcIndex = null;
  focusedIndex = -1;

  document.getElementById('restart-btn').style.display = 'none';
  document.getElementById('start-btn').style.display = 'block';
  clearBattle();
  setMessage('カードをドラッグ、または←→キーで並び替えてください');
  renderHands();
}

// Allow drag over gaps between cards
document.getElementById('player-hand').addEventListener('dragover', (e) => {
  if (phase === 'arrange') e.preventDefault();
});

initGame();
</script>

</body>
</html>
